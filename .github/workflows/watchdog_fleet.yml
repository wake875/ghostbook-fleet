name: "Watchdog - 守护自循环攻击"

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check and revive if needed
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: python watchdog.py
